<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <title>FunSun.Auth</title>
        
        <!-- Стили Header и Footer (скопированы в public) -->
        <link rel="stylesheet" href="/css/header.css" />
        <link rel="stylesheet" href="/css/footer.css" />

        <style>
            body {
                margin: 0;
            }
        </style>
  </head>
  <body>
        <div id="app">
            <!-- App.vue рендерится здесь -->
        </div>

        <!-- Vue App -->
        <script type="module">
            import { createApp } from 'vue'
            import { createPinia } from 'pinia'
            import { createRouter, createWebHistory } from 'vue-router'
            import App from '/src/App.vue'
            
            // Импорт всего через index.ts (централизованно)
            import {
                AuthInput,
                AuthButton,
                AuthCheckbox,
                HeaderBlock,
                AppFooter,
                vOutside
            } from '/src/index.ts'

            // Создаем приложение с App.vue
            const app = createApp(App)

            // Инициализируем Pinia (нужна для Header/Footer)
            const pinia = createPinia()
            app.use(pinia)
            
            // Создаем простой роутер (нужен для Footer)
            const router = createRouter({
                history: createWebHistory(),
                routes: [
                    { path: '/', redirect: '/login' },
                    { path: '/login', component: { template: '<div></div>' } },
                    { path: '/signup', component: { template: '<div></div>' } }
                ]
            })
            app.use(router)
            
            // Регистрируем директиву click-outside (используется в Header/Footer)
            app.directive('click-outside', vOutside)
            
            // Регистрируем Header и Footer
            app.component('HeaderBlock', HeaderBlock)
            app.component('AppFooter', AppFooter)
            
            // Регистрируем Auth компоненты
            app.component('AuthInput', AuthInput)
            app.component('AuthButton', AuthButton)
            app.component('AuthCheckbox', AuthCheckbox)

            app.mount('#app')
        </script>
  </body>
</html>
