<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <title>FunSun.Auth</title>
        
        <!-- Стили Header и Footer (скопированы в public) -->
        <link rel="stylesheet" href="/css/header.css" />
        <link rel="stylesheet" href="/css/footer.css" />

        <style>
            body {
                margin: 0;
            }
        </style>
  </head>
  <body>
        <!--        <div id="app">-->
        <!--            &lt;!&ndash; App.vue рендерится здесь &ndash;&gt;-->
        <!--        </div>-->

        <header id="header">
            <!-- App.vue рендерится здесь -->
        </header>

        <main id="main">
                <h1>TEST</h1>
            <!-- App.vue рендерится здесь -->
        </main>

        <footer id="footer">
            <!-- App.vue рендерится здесь -->
        </footer>

        <!-- Vue App -->
        <script type="module">
            import { createApp } from 'vue'
            import { createPinia } from 'pinia'
            import { createRouter, createWebHistory } from 'vue-router'
            import App from '/src/App.vue'

            // Импорт всего через index.ts (централизованно)
            import {
                AuthInput,
                AuthButton,
                AuthCheckbox,
                HeaderBlock,
                AppFooter,
                vOutside
            } from '/src/index.ts'

            // Создаем приложение с App.vue
            // const app = createApp(App)
            const header = createApp(HeaderBlock)
            const main = createApp(App)
            const footer = createApp(AppFooter)

            // Инициализируем Pinia (нужна для Header/Footer)
            const pinia = createPinia()
            main.use(pinia)
            
            // Создаем простой роутер (нужен для Footer)
            const router = createRouter({
                history: createWebHistory(),
                routes: [
                    { path: '/', redirect: '/login' },
                    { path: '/login', component: { template: '<div></div>' } },
                    { path: '/signup', component: { template: '<div></div>' } }
                ]
            })
            main.use(router)
            
            // Регистрируем директиву click-outside (используется в Header/Footer)
            main.directive('click-outside', vOutside)
            
            // Регистрируем Header и Footer
            main.component('HeaderBlock', HeaderBlock)
            main.component('AppFooter', AppFooter)
            
            // Регистрируем Auth компоненты
            main.component('AuthInput', AuthInput)
            main.component('AuthButton', AuthButton)
            main.component('AuthCheckbox', AuthCheckbox)

            header.mount('#header')
            main.mount('#main')
            footer.mount('#footer')
        </script>
  </body>
</html>
