<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <title>FunSun.Auth</title>
        
        <!-- Стили Header и Footer (скопированы в public) -->
        <link rel="stylesheet" href="/css/header.css" />
        <link rel="stylesheet" href="/css/footer.css" />

        <style>
            body {
                margin: 0;
            }
        </style>
  </head>
  <body>
        <!-- Header (Vue компонент) -->
        <header id="header"></header>

        <!-- Main (HTML с веб-компонентами) -->
        <main id="main"></main>

        <!-- Footer (Vue компонент) -->
        <footer id="footer"></footer>

        <!-- Vue App -->
        <script type="module">
            import { createApp } from 'vue'
            import { createPinia } from 'pinia'
            import { createRouter, createWebHistory } from 'vue-router'
            import App from '/src/App.vue'

            // Импорт всего через index.ts (централизованно)
            import { HeaderBlock, AppFooter, vOutside } from '/src/index.ts'
            
            // Импорт веб-компонентов (автоматически регистрируются)
            import '@fun-sun/vue-components/web-components'

            // Создаем Pinia (общая для всех приложений)
            const pinia = createPinia()
            
            // Создаем Router (общий для всех приложений)
            const router = createRouter({
                history: createWebHistory(),
                routes: [
                    { path: '/', redirect: '/login' },
                    { path: '/login', component: { template: '<div></div>' } },
                    { path: '/signup', component: { template: '<div></div>' } }
                ]
            })
            
            // === Header приложение ===
            const headerApp = createApp(HeaderBlock, {
                locale: 'ru',           // Локаль (обязательно)
            })
            headerApp.use(pinia)
            headerApp.use(router)
            headerApp.directive('click-outside', vOutside)
            headerApp.mount('#header')
            
            // === Main приложение (для загрузки HTML с веб-компонентами) ===
            const mainApp = createApp({
                data() {
                    return {
                        content: ''
                    }
                },
                mounted() {
                    const path = window.location.pathname
                    const pageName = path.includes('signup') ? 'signup' : 'login'
                    
                    fetch(`/src/pages/${pageName}/index.html`)
                        .then(res => res.text())
                        .then(html => {
                            document.getElementById('main').innerHTML = html
                        })
                }
            })
            mainApp.mount('#main')
            
            // === Footer приложение ===
            const footerApp = createApp(AppFooter)
            footerApp.use(pinia)
            footerApp.use(router)
            footerApp.directive('click-outside', vOutside)
            footerApp.mount('#footer')
        </script>
  </body>
</html>
