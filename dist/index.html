<html lang="ru">

        <button
            onclick="window.history.back()"
            class="layout__link js-back-button"
        >
            <img
                class="layout__link-logo"
                src="/icons/funsun-logo.svg"
                alt="Fun&Sun"
                width="24"
                height="24"
            />

        <main
            id="main"
            class="main-container"
        ></main>

        <div class="about-cookies shadow-20dp-bottom js-cookie-consent-banner">
            <div>
                <span class="caption_L">Мы используем </span>
                <a
                    href="https://fstravel.com/agreement"
                    class="caption_L about-cookies__link"
                    target="_blank"
                >
                    файлы cookies,
                </a>
                <span class="caption_L"> чтобы всё работало как надо</span>
            </div>
            <web-button
                size="S"
                class="js-cookie-consent-accept"
            >
                Соглашаюсь
