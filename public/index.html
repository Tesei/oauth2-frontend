<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <title>FunSun.Auth</title>

        <!-- Bootstrap CSS -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />

        <style>
            body {
                background-color: #f8f9fa;
                margin: 0;
            }
        </style>
    </head>
    <body>
        <div id="app">
            <!-- ============================================ -->
            <!-- HEADER - один раз описан, используется везде -->
            <!-- ============================================ -->
            <header>
                <nav class="navbar navbar-expand-sm navbar-light bg-white border-bottom mb-3">
                    <div class="container">
                        <a
                            class="navbar-brand"
                            href="/"
                        >
                            FunSun.Auth
                        </a>
                    </div>
                </nav>
            </header>

            <!-- ============================================ -->
            <!-- MAIN CONTENT - сюда загружается контент страниц -->
            <!-- ============================================ -->
            <div class="container">
                <main
                    role="main"
                    class="pb-1"
                >
                    <div id="page-content">
                        <!-- Контент страницы загружается сюда -->
                    </div>
                </main>
            </div>

            <!-- ============================================ -->
            <!-- FOOTER - один раз описан, используется везде -->
            <!-- ============================================ -->
            <footer class="footer border-top text-muted">
                <div class="container">&copy; 2025 - FunSun.Auth</div>
            </footer>
        </div>

        <!-- Vue App -->
        <script type="module">
            import { createApp } from 'https://unpkg.com/vue@3/dist/vue.esm-browser.js'
            import AuthInput from '/src/shared/ui/auth/AuthInput.vue'
            import AuthButton from '/src/shared/ui/auth/AuthButton.vue'
            import AuthCheckbox from '/src/shared/ui/auth/AuthCheckbox.vue'

            // Глобальные данные для всех страниц
            const appData = {
                currentPage: 'login',
                // Данные для Login
                loginData: {
                    email: '',
                    password: '',
                    rememberMe: false,
                },
                // Данные для Signup
                signupData: {
                    email: '',
                    password: '',
                    confirmPassword: '',
                },
                // Методы
                handleLoginSubmit() {
                    console.log('Login:', this.loginData)
                    alert(`Email: ${this.loginData.email}`)
                },
                handleSignupSubmit() {
                    console.log('Signup:', this.signupData)
                    alert(`Email: ${this.signupData.email}`)
                },
            }

            const app = createApp({
                data() {
                    return appData
                },
            })

            // Регистрируем компоненты
            app.component('AuthInput', AuthInput)
            app.component('AuthButton', AuthButton)
            app.component('AuthCheckbox', AuthCheckbox)

            // ✅ КОГДА ПОЛУЧИТЕ NPM ПАКЕТ:
            // import { Header, Footer } from 'ваш-ui-kit'
            // app.component('AppHeader', Header)
            // app.component('AppFooter', Footer)
            // Заменить <header> на <app-header />

            app.mount('#app')

            // ============================================
            // Простой роутер для загрузки контента
            // ============================================
            async function loadPage(pageName) {
                const response = await fetch(`/pages/content/${pageName}.html`)
                const html = await response.text()
                document.getElementById('page-content').innerHTML = html
            }

            // Загружаем контент на основе URL
            const path = window.location.pathname
            if (path.includes('login')) {
                loadPage('login')
            } else if (path.includes('signup')) {
                loadPage('signup')
            } else {
                loadPage('login') // default
            }

            // Навигация
            window.addEventListener('popstate', () => {
                // Обработка навигации
            })
        </script>
    </body>
</html>
