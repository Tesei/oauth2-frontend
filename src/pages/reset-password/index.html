<!-- Аналитика: Смена пароля -->
<script>
// Событие: успешная смена пароля (вызывает бэкенд после успешной смены)
function sendSuccessRestorePassword() {
    dataLayer.push({
        event: "success_restore_password"
    });
}

// Событие: ошибка при смене пароля (вызывает бэкенд при ошибке)
function sendErrorRestorePassword(errorText) {
    dataLayer.push({
        event: "error_restore_password",
        event_action: errorText  // Текст ошибки из UI
    });
}
</script>

<h2 class="Heading_1 m-0 mb-32">Изменение пароля</h2>

<div class="auth-card bg-white radius-16 shadow-5dp py-32 px-24 w-100p md3-py-24 md3-px-16">
        <form id="reset-password-form" method="post">

            <!-- Новый пароль -->
            <web-input-password
                class="mb-20 md3-mb-16"
                name="NewPassword"
                placeholder="password"
                label="Новый пароль"
                autocomplete="new-password"
                error-text="Укажите пароль"
            ></web-input-password>

            <!-- Кнопка изменить -->
            <web-button
                id="submit-new-password"
                type="submit"
                class="button_yellow w-100p"
            >
                Изменить
        </web-button>
    </form>
</div>

<!-- Footer текст -->
<div class="auth-footer mt-32">
