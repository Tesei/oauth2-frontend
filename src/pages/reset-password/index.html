<div class="login-page flex flex-d-c jc-center ai-c px-20 py-40 bg-gray-5 md3-p-16">
    <h2 class="Heading_1 m-0 mb-24 md3-mb-32">Изменение пароля</h2>

    <div class="login-page__card bg-white radius-16 shadow-5dp py-32 px-24 w-100p md3-py-24 md3-px-16">
        <form id="reset-password-form" method="post">

            <!-- Новый пароль -->
            <web-input-password
                class="mb-20 md3-mb-16"
                name="NewPassword"
                placeholder="password"
                label="Новый пароль"
                autocomplete="new-password"
                error-text="Укажите пароль"
            ></web-input-password>

            <!-- Кнопка изменить -->
            <web-button
                id="submit-new-password"
                type="submit"
                class="button_yellow w-100p"
            >
                Изменить
            </web-button>
        </form>
    </div>
</div>
