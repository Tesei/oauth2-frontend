<!-- Аналитика: Восстановление пароля -->

<h2 class="Heading_1 m-0 mb-32">Восстановление пароля</h2>

<div class="auth-card bg-white radius-16 shadow-5dp py-32 px-24 w-100p md3-py-24 md3-px-16">
        <form id="forgot-password-form" method="post">

        <!-- Текст инструкции -->
        <p class="forgot-password__text c-black mb-24">
                Пожалуйста, укажите вашу почту, мы отправим электронное письмо для восстановления пароля. Если оно не придет, обязательно проверьте папку со спамом
            </p>

            <!-- Email input -->
            <web-input
                class="mb-24"
                name="Email"
                type="email"
                placeholder=""
                label="Введите email для восстановления"
                required=""
                autocomplete="email"
                validate-on-blur
            ></web-input>

            <!-- Кнопка отправить -->
            <web-button
                id="submit-reset"
                type="submit"
                class="button_yellow w-100p"
            >
                Отправить
        </web-button>
    </form>
</div>

<script>

    // Флаг для предотвращения дублирования событий
    let errorRestorePasswordSent = false;

    // Событие: ошибка при восстановлении
    function sendErrorRestorePassword(errorText) {
        // Предотвращаем дублирование
        if (errorRestorePasswordSent) return;
        errorRestorePasswordSent = true;

        if (window.dataLayer) {
            window.dataLayer.push({
                event: "error_restore_password",
                event_action: errorText
            });
        }
    }

    // Автоматический tracking ошибок
    document.addEventListener('DOMContentLoaded', () => {
        const form = document.querySelector('#forgot-password-form');
        if (!form) return;

        const emailInput = form.querySelector('web-input[name="Email"]');

        // Server-side ошибка (при загрузке)
        // Способ 1: Через атрибут (быстро)
        let error = emailInput?.getAttribute('error-text');

        // Способ 2: Через DOM (fallback)
        if (!error) {
            error = form.querySelector('.input__error-text')?.textContent.trim();
        }

        if (error) {
            sendErrorRestorePassword(error);
        }

        // Client-side ошибка (при submit)
        form.addEventListener('submit', () => {
            // Сбрасываем флаг при новой отправке формы
            errorRestorePasswordSent = false;

            setTimeout(() => {
                const errorAfterSubmit = form.querySelector('.input__error-text')?.textContent.trim();
                if (errorAfterSubmit) {
                    sendErrorRestorePassword(errorAfterSubmit);
                }
            }, 100);
        });

        // ВАЖНО ДЛЯ МОБИЛЬНОЙ ВЕРСИИ: Отслеживаем динамические изменения error-text
        if (emailInput) {
            let lastError = emailInput.getAttribute('error-text') || '';

            const observer = new MutationObserver((mutations) => {
                mutations.forEach((mutation) => {
                    if (mutation.type === 'attributes' && mutation.attributeName === 'error-text') {
                        const currentError = emailInput.getAttribute('error-text') || '';

                        // Если ошибка изменилась (новая ошибка), сбрасываем флаг и отправляем событие
                        if (currentError !== lastError) {
                            lastError = currentError;

                            // Проверяем, что это не label и не placeholder
                            const label = emailInput.getAttribute('label') || '';
                            const placeholder = emailInput.getAttribute('placeholder') || '';

                            if (currentError && currentError.trim() !== '' && currentError !== label && currentError !== placeholder) {
                                // Сбрасываем флаг для новой ошибки
                                errorRestorePasswordSent = false;
                                sendErrorRestorePassword(currentError.trim());
                            }
                        }
                    }
                });
            });

            // Наблюдаем за изменениями атрибута error-text
            observer.observe(emailInput, {
                attributes: true,
                attributeFilter: ['error-text']
            });
        }
    });
</script>
