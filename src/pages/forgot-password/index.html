<!-- Аналитика: Восстановление пароля -->

<script>
    // Событие: успешная отправка письма для восстановления
    function sendSuccessRestorePassword() {
        dataLayer.push({
            event: "success_restore_password"
        });
    }

    // Событие: ошибка при восстановлении
    function sendErrorRestorePassword(errorText) {
        dataLayer.push({
            event: "error_restore_password",
            event_action: errorText
        });
    }
    
    // Автоматический tracking ошибок (client-side и server-side)
    document.addEventListener('DOMContentLoaded', () => {
        const form = document.querySelector('#forgot-password-form');
        if (!form) return;
        
        // Проверяем server-side ошибку сразу при загрузке
        const errorOnLoad = form.querySelector('.input__error-text')?.textContent.trim();
        if (errorOnLoad) {
            sendErrorRestorePassword(errorOnLoad);
        }
        
        // Слушаем submit для client-side ошибок
        form.addEventListener('submit', () => {
            setTimeout(() => {
                const errorAfterSubmit = form.querySelector('.input__error-text')?.textContent.trim();
                if (errorAfterSubmit) {
                    sendErrorRestorePassword(errorAfterSubmit);
                }
            }, 100);
        });
    });
</script>

<h2 class="Heading_1 m-0 mb-32">Восстановление пароля</h2>

<div class="auth-card bg-white radius-16 shadow-5dp py-32 px-24 w-100p md3-py-24 md3-px-16">
        <form id="forgot-password-form" method="post">

            <!-- Текст инструкции -->
            <p class="forgot-password__text c-black mb-24" style="text-align: center;">
                Пожалуйста, укажите вашу почту, мы отправим электронное письмо для восстановления пароля. Если оно не придет, обязательно проверьте папку со спамом
            </p>

            <!-- Email input -->
            <web-input
                class="mb-24"
                name="Email"
                type="email"
                placeholder="Введите email для восстановления*"
                label="Email"
                autocomplete="email"
                error-text="Такая почта еще не зарегистрирована"
            ></web-input>

            <!-- Кнопка отправить -->
            <web-button
                id="submit-reset"
                type="submit"
                class="button_yellow w-100p"
            >
                Отправить
        </web-button>
    </form>
</div>
