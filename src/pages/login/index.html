<div class="flex flex-d-c jc-center ai-c px-20 py-40 bg-gray-5">
    <!-- @Localizer["Title"] -->
    <h2 class="m-0 mb-24">Войдите в профиль</h2>

    <div class="bg-white radius-16 shadow-5dp py-32 px-24 w-100p">
        <form
            id="account"
            method="post"
        >
            <!-- ОТСУТСТВУЕТ: <partial name="_StatusMessage" for="StatusMessages" /> -->
            <!-- Для CSHTML нужно добавить здесь, если требуется показывать статус сообщения -->

            <!-- CSHTML: label="@Localizer['EmailLabel']" value="@Model.Email" error-text="@Model.Errors.Email" -->
            <web-input
                class="mb-20"
                name="LoginInput.Email"
                type="email"
                placeholder="name@example.com"
                label="Email"
                autocomplete="username"
                required
                model-value="fstravel@mail.ru"
                error-text="текст ошибки"
            ></web-input>

            <!-- CSHTML: label="@Localizer['PasswordLabel']" placeholder="@Localizer['PasswordPlaceholder']" value="@Model.Password" error-text="@Model.Errors.Password" -->
            <web-input-password
                name="LoginInput.Password"
                placeholder="password"
                label="Пароль"
                autocomplete="current-password"
                required
                error-text="текст ошибки"
            ></web-input-password>

            <!-- ОТСУТСТВУЕТ: Remember Me checkbox (закомментирован - нет в дизайне) -->
            <!-- Если нужно для CSHTML - раскомментировать:
            <web-checkbox
                name="LoginInput.RememberMe"
                label="@Localizer["RememberMeLabel"]"
                checked="@Model.RememberMe"
            ></web-checkbox>
            -->

            <!-- CSHTML: href="@Url.PageWithoutNormalizeQuery("/ForgotPassword/Index", ...)" текст: @Localizer["ForgotPasswordLink"] -->
            <div class="mt-8">
                <a
                    class="c-gray"
                    id="forgot-password"
                    href="/forgot-password"
                >
                    Не помню пароль
                </a>
            </div>

            <web-alert class="mb-4 mt-8">
                <span slot="subtitle">
                    <!--костыль снизу для соответсвия дизайну, все что
                    в span первом по иерархии - можно удалить, как и класс и атрибут стиля -->
                    <span
                        style="max-width: 350px"
                        class="block"
                    >
                        <span class="alert-subtitle flex jc-center"> Превышено количество попыток </span>
                        <span> ввода пароля. Ваша учетная запись заблокирована на 15 минут </span>
                    </span>

                    <br />
                    <p class="font-button_S c-gray">14:58 мин</p>
                </span>
            </web-alert>

            <!-- CSHTML: class доп.атрибуты disabled="@Model.IsSubmitting" loading="@Model.IsLoading", текст: @Localizer["LoginButton"] -->
            <div class="login-submit mt-32">
                <web-button
                    id="login-submit"
                    type="submit"
                    class="button_yellow w-100p"
                >
                    Войти
                </web-button>
            </div>

            <div class="login-divider">
                <span class="login-divider-line"></span>
                <span class="login-divider-text">или</span>
                <span class="login-divider-line"></span>
            </div>

            <!-- External Providers - @foreach (var provider in Model.ExternalLogins.Schemes) -->
            <div
                class="flex flex-d-r mb-16"
                style="gap: 12px"
            >
                <web-button
                    class="bg-black c-white radius-12 w-100p"
                    custom-class="login-social-btn"
                >
                    <img
                        class="mr-12"
                        src="/icons/yandex.svg"
                        alt="Yandex"
                        width="24"
                        height="24"
                    />
                    <span>Войти с</span>
                </web-button>

                <web-button
                    class="bg-black c-white radius-12 w-100p"
                    custom-class="login-social-btn"
                >
                    <span>Войти с</span>
                    <img
                        class="ml-8"
                        src="/icons/wildberries.svg"
                        alt="Wildberries"
                        width="40"
                        height="20"
                    />
                </web-button>
            </div>
            <!-- CSHTML: динамические провайдеры из Model.ExternalLogins.Schemes
                 @foreach (var provider in Model.ExternalLogins.Schemes) {
                     <web-button 
                         name="provider" 
                         value="@provider.Name"
                         title="@Localizer["ExternalLoginButton", provider.DisplayName]"
                     >
                         <span>Войти с</span>
                         <img src="/icons/@(provider.Name.ToLower()).svg" />
                     </web-button>
                 }
            -->

            <!-- CSHTML: href="@Url.PageWithoutNormalizeQuery("/SignUp/Index", ...)" текст: @Localizer["RegisterLink"] -->
            <div
                class="mt-20"
                style="text-align: center"
            >
                <a
                    id="register"
                    href="/signup"
                    class="c-cornflower"
                >
                    Зарегистрироваться
                </a>
            </div>

            <!-- ОТСУТСТВУЕТ: Секция "Используйте другой сервис для входа" (была справа в двух колонках) -->
            <!-- В дизайне кнопки соцсетей внутри основной формы, поэтому отдельная секция не нужна -->
        </form>
    </div>
</div>

<!-- Минимальные стили (то что нельзя заменить утилитарными классами) -->
<style>
    /* Контейнер страницы */
    .flex.flex-d-c.jc-center {
        min-height: 60vh;
    }

    /* Заголовок */
    h2.m-0.mb-24 {
        font-size: 36px;
        font-weight: 600;
        line-height: 48px;
        text-align: center;
    }

    /* Карточка */
    .bg-white.radius-16 {
        max-width: 524px;
    }

    /* Ссылки */
    a {
        text-decoration: none;
        font-size: 14px;
    }

    a:hover {
        text-decoration: underline;
    }

    /* Регистрация */
    div[style*='text-align: center'] a {
        font-size: 16px;
    }

    /* Разделитель "или" */
    .login-divider {
        display: flex;
        align-items: center;
        margin: 20px 0;
        gap: 12px;
    }

    .login-divider-line {
        flex: 1;
        height: 1px;
        background: #dbe0e5;
    }

    .login-divider-text {
        color: #7e8389;
        font-size: 14px;
    }

    /* Кнопки соцсетей */
    .login-social-btn {
        flex: 1;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
    }
</style>
