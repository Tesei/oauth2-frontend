<div class="auth-card">
    <web-button-control
        onclick="window.history.back()"
        class="auth-card__close-button js-back-button"
    ></web-button-control>
    <h1 class="text-center heading_3 mb-24">
        Зарегистрируйтесь
        <p>или войдите</p>
    </h1>
    <a
        href="/"
        class="button_M auth-button auth-button--wb tr-all-2 mb-12"
        onclick="dataLayer.push({ event: 'login_attempt', method: 'wbid' })"
    >
        <img
            class="ml-8"
            src="/icons/wildberries.svg"
            alt="Wildberries"
            width="40"
            height="20"
        />
        <span>Войти с WB ID</span>
    </a>
    <a
        href="/"
        class="button_M auth-button auth-button--gray tr-all-2 mb-24"
        onclick="dataLayer.push({ event: 'login_attempt', method: 'yandexid' })"
    >
        <img
            class="mr-12"
            src="/icons/yandex.svg"
            alt="Yandex"
            width="24"
            height="24"
        />
        <span>Войти с Яндекс ID</span>
    </a>
    <div class="flex f-center caption_L mb-24 c-text-secondary">или</div>
    <form
        id="account"
        method="post"
    >
        <web-input-phone
            name="LoginInput.Phone"
            placeholder="+7 999 000 00 00"
            autocomplete="current-phone"
            model-value="+7"
            class="mb-12"
            error-text="Некорректный номер телефона"
        ></web-input-phone>

        <web-button
            id="login-submit"
            type="submit"
            onclick="dataLayer.push({ event: 'login_attempt', method: 'authorization' })"
            class="w-100p mb-24"
        >
            Продолжить
        </web-button>
    </form>

    <web-button
        color-type="Ghost"
        class="w-100p mb-24"
        link="/"
    >
        Войти по почте
    </web-button>


    <div class="caption_M c-text-tertiary agreement-block">
        <span
            >Нажимая кнопку «Продолжить» я даю согласие на обработку и передачу персональных данных, ознакомлен и
            принимаю
        </span>
        <a
            href=""
            class="auth-card__link"
        >
            условия пользовательского соглашения
        </a>
        <span>,&nbsp;а&nbsp;также принимаю </span>
        <a
            href=""
            class="auth-card__link"
        >
            условия участия в программе лояльности
        </a>
    </div>
</div>
