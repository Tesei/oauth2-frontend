<div class="login-page flex flex-d-c jc-center ai-c px-20 py-40 bg-gray-5 md3-p-16">
    <!-- @Localizer["Title"] -->
    <h2 class="login-page__title m-0 mb-24 md3-mb-32">Войдите в профиль</h2>

    <div class="login-page__card bg-white radius-16 shadow-5dp py-32 px-24 w-100p md3-py-24 md3-px-16">
        <form
            id="account"
            method="post"
        >

            <!-- required можно поставить если нужно (убрал из-за того что звездочка подставляется" /> -->
            <web-input
                class="mb-20 md3-mb-16"
                name="LoginInput.Email"
                type="email"
                placeholder="name@example.com"
                label="Email"
                autocomplete="username"
                model-value="fstravel@mail.ru"
                error-text="текст ошибки"
            ></web-input>

            <!-- required можно поставить если нужно (убрал из-за того что звездочка подставляется" /> -->
            <web-input-password
                name="LoginInput.Password"
                placeholder="password"
                label="Пароль"
                autocomplete="current-password"
                error-text="текст ошибки"
            ></web-input-password>

            <!-- ОТСУТСТВУЕТ: Remember Me checkbox (закомментирован - нет в дизайне) -->
            <!-- Если нужно для CSHTML - раскомментировать:
            <web-checkbox
                name="LoginInput.RememberMe"
                label="@Localizer["RememberMeLabel"]"
                checked="@Model.RememberMe"
            ></web-checkbox>
            -->

            <!-- CSHTML: href="@Url.PageWithoutNormalizeQuery("/ForgotPassword/Index", ...)" текст: @Localizer["ForgotPasswordLink"] -->
            <div class="mt-8">
                <a
                    class="c-gray"
                    id="forgot-password"
                    href="/forgot-password"
                >
                    Не помню пароль
                </a>
            </div>

            <web-alert class="mb-4 mt-8 md3-mt-16">
                <span slot="subtitle">
                    <!-- Desktop: текст с ограничением ширины, Mobile: обычный текст -->
                    <span class="login-page__alert-text block">
                        <span class="login-page__alert-title flex jc-center">Превышено количество попыток</span>
                        <span>ввода пароля. Ваша учетная запись заблокирована на 15 минут</span>
                    </span>

                    <br />
                    <p class="font-button_S c-gray">14:58 мин</p>
                </span>
            </web-alert>

            <!-- CSHTML: class доп.атрибуты disabled="@Model.IsSubmitting" loading="@Model.IsLoading", текст: @Localizer["LoginButton"] -->
            <div class="login-submit mt-32 md3-mt-20">
                <web-button
                    id="login-submit"
                    type="submit"
                    class="button_yellow w-100p"
                    disabled
                >
                    Войти
                </web-button>
            </div>

            <div class="login-divider">
                <span class="login-divider-line"></span>
                <span class="login-divider-text">или</span>
                <span class="login-divider-line"></span>
            </div>

            <!-- External Providers - @foreach (var provider in Model.ExternalLogins.Schemes) -->
            <div class="login-page__social flex flex-d-r md3-flex-d-c mb-16">
                <web-button
                    class="login-social-btn c-white radius-8 w-100p"
                    custom-class="login-social-btn"
                >
                    <img
                        class="mr-12"
                        src="/icons/yandex.svg"
                        alt="Yandex"
                        width="24"
                        height="24"
                    />
                    <!--костыль снизу для соответсвия дизайну, все что
                    в span первом по иерархии - можно удалить, как и класс и атрибут стиля -->
                    <span class="login-social-btn__text login-social-btn__text-desktop">Войти с Яндекс ID</span>
                    <span class="login-social-btn__text login-social-btn__text-mobile ">Яндекс ID</span>
                </web-button>

                <web-button
                    class="login-social-btn c-white radius-8 w-100p"
                    custom-class="login-social-btn"
                >
                    <span class="login-social-btn__text">Войти с</span>
                    <img
                        class="ml-8"
                        src="/icons/wildberries.svg"
                        alt="Wildberries"
                        width="40"
                        height="20"
                    />
                </web-button>
            </div>
            <!-- CSHTML: динамические провайдеры из Model.ExternalLogins.Schemes
                 @foreach (var provider in Model.ExternalLogins.Schemes) {
                     <web-button 
                         name="provider" 
                         value="@provider.Name"
                         title="@Localizer["ExternalLoginButton", provider.DisplayName]"
                     >
                         <span>Войти с</span>
                         <img src="/icons/@(provider.Name.ToLower()).svg" />
                     </web-button>
                 }
            -->

            <!-- CSHTML: href="@Url.PageWithoutNormalizeQuery("/SignUp/Index", ...)" текст: @Localizer["RegisterLink"] -->
            <div
                class="login_register mt-20"
                style="text-align: center"
            >
                <a
                    id="register"
                    href="/signup"
                    class="c-cornflower"
                >
                    Зарегистрироваться
                </a>
            </div>

            <!-- ОТСУТСТВУЕТ: Секция "Используйте другой сервис для входа" (была справа в двух колонках) -->
            <!-- В дизайне кнопки соцсетей внутри основной формы, поэтому отдельная секция не нужна -->
        </form>
    </div>
</div>

<!-- Стили страницы Login (БЭМ методология) -->
<style>
    /* Блок: login-page */
    .login-page {
        min-height: 60vh;
    }

    /* Элемент: заголовок */
    .login-page__title {
        font-size: 36px;
        font-weight: 600;
        line-height: 48px;
        text-align: center;
    }

    /* Элемент: карточка */
    .login-page__card {
        max-width: 524px;
    }

    /* Элемент: текст alert (Desktop - с ограничением ширины) */
    .login-page__alert-text {
        max-width: 350px;
    }

    /* Элемент: кнопки соцсетей */
    .login-page__social {
        gap: 12px;
    }

    .login-social-btn {
        background: #000000;

    }
    .login-social-btn .button {
        padding: 16px 24px;
    }

    .c-cornflower {
        font-size: 16px;
    }

    /* Разделитель "или" */
    .login-divider {
        display: flex;
        align-items: center;
        margin: 20px 0;
        gap: 12px;
    }

    .login-divider-line {
        flex: 1;
        height: 1px;
        background: #dbe0e5;
    }

    .login-divider-text {
        color: #7e8389;
        font-size: 14px;
    }

    /* Текст кнопок: по умолчанию показываем desktop */
    .login-social-btn__text-desktop {
        display: inline;
    }
    .login-social-btn__text-mobile {
        display: none;
    }

    /* Модификатор для кнопок соцсетей */
    .login-social-btn {
        flex: 1;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
    }

    @media (max-width: 1023px) {
        .login-page__title {
            font-size: 24px;
            line-height: 32px;
        }
        .login-page__social {
            gap: 20px;
        }
        .c-cornflower {
            font-size: 12px;
            font-style: normal;
            font-weight: 600;
            line-height: 22px;
        }

        .login-social-btn__text {
            font-size: 17px;
        }
        
        /* Alert: убираем ограничение ширины, текст одной строкой */
        .login-page__alert-text {
            max-width: none;
        }
        /* Яндекс: скрываем длинный текст, показываем короткий */
        .login-social-btn__text-desktop {
            display: none;
        }
        .login-social-btn__text-mobile {
            display: inline;
        }
    }

</style>
