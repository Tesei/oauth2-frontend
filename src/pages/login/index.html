<!-- Login страница с веб-компонентами (FSD: pages/login) -->
<h1>Вход</h1>
<div class="row">
    <div class="col-md-4">
        <section>
            <form
                id="account"
                method="post"
            >
                <h2>Используйте локальную учетную запись для входа.</h2>
                <hr />

                <!-- Веб-компоненты из @fun-sun/vue-components -->
                
                <!-- Email поле -->
                <web-input
                    name="LoginInput.Email"
                    type="email"
                    placeholder="name@example.com"
                    label="Email"
                    autocomplete="username"
                    required="true"
                ></web-input>

                <!-- Password поле -->
                <web-input-password
                    name="LoginInput.Password"
                    placeholder="password"
                    label="Пароль"
                    autocomplete="current-password"
                    required="true"
                ></web-input-password>

                <!-- Remember Me checkbox -->
                <web-checkbox
                    name="LoginInput.RememberMe"
                    label="Запомнить меня"
                ></web-checkbox>

                <!-- Submit button -->
                <div>
                    <web-button
                        id="login-submit"
                        type="submit"
                        custom-class="w-100"
                    >
                        Войти
                    </web-button>
                </div>

                <!-- Links -->
                <div>
                    <p>
                        <a
                            id="forgot-password"
                            href="/forgot-password"
                        >
                            Забыли пароль?
                        </a>
                    </p>
                    <p>
                        <a
                            id="register"
                            href="/signup"
                        >
                            Зарегистрироваться как новый пользователь
                        </a>
                    </p>
                </div>
            </form>
        </section>
    </div>

    <div class="col-md-6 col-md-offset-2">
        <section>
            <h3>Используйте другой сервис для входа.</h3>
            <hr />
            <p class="text-muted">Внешние провайдеры не настроены</p>
        </section>
    </div>
</div>
