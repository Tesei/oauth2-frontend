
<!-- Скрипт для обработки событий аналитики -->

<h2 class="Heading_1 m-0 mb-32">Войдите в профиль</h2>

<div class="auth-card bg-white radius-16 shadow-5dp py-32 px-24 w-100p md3-py-24 md3-px-16">
    <form id="account" method="post"> 
            <web-input
                class="mb-20 md3-mb-16"
                name="LoginInput.Email"
                type="email"
                placeholder="name@example.com"
                label="Email"
                autocomplete="username"
                validate-on-blur
            ></web-input>

            <web-input-password
                name="LoginInput.Password"
                placeholder="password"
                label="Пароль"
                autocomplete="current-password"
                error-text="текст ошибки"
            ></web-input-password>

            <div class="mt-8">
                <a class="body_S c-gray" id="forgot-password" href="/old-forgot-password">
                    Не помню пароль
                </a>
            </div>

            <web-alert class="mb-4 mt-8 md3-mt-16">
                <span slot="subtitle">
                    <span class="login-page__alert-text block">
                        <span class="login-page__alert-title flex jc-center">Превышено количество попыток</span>
                        <span>ввода пароля. Ваша учетная запись заблокирована на 15 минут</span>
                    </span>
                    <br />
                    <p class="font-button_S c-gray">14:58 мин</p>
                </span>
            </web-alert>

            <div class="login-submit mt-32 md3-mt-20">
                <web-button 
                    id="login-submit" 
                    type="submit" 
                    class="button_yellow w-100p" 
                    onclick="dataLayer.push({event: 'login_attempt', method: 'authorization'})"

                >
                    Войти
                </web-button>
            </div>

            <div class="login-divider">
                <span class="login-divider-line"></span>
                <span class="body_S c-gray">или</span>
                <span class="login-divider-line"></span>
            </div>

            <div class="login-page__social flex flex-d-r md3-flex-d-c mb-16">
                <web-button 
                    class="login-social-btn c-white radius-8 w-100p" 
                    custom-class="login-social-btn"
                    onclick="dataLayer.push({event: 'login_attempt', method: 'yandexid'})"
                >
                    <img class="mr-12" src="/icons/yandex.svg" alt="Yandex" width="24" height="24" />
                    <span class="login-social-btn__text login-social-btn__text-desktop">Войти с Яндекс ID</span>
                    <span class="login-social-btn__text login-social-btn__text-mobile ">Яндекс ID</span>
                </web-button>

                <web-button 
                    class="login-social-btn c-white radius-8 w-100p" 
                    custom-class="login-social-btn"
                    onclick="dataLayer.push({event: 'login_attempt', method: 'wbid'})"
                >
                    <span class="login-social-btn__text">Войти с</span>
                    <img class="ml-8" src="/icons/wildberries.svg" alt="Wildberries" width="40" height="20" />
                </web-button>
            </div>

            <div class="login_register mt-20" style="text-align: center">
                <a id="register" href="/old-signup" class="auth-register-link c-cornflower">
                    Зарегистрироваться
                </a>
            </div>
        </form>
    </div>

<script>
    // Флаг для предотвращения дублирования событий
    let failedAuthSent = false;

    // Событие: ошибка авторизации
    function sendFailedAuth(errorText) {
        // Предотвращаем дублирование
        if (failedAuthSent) return;
        failedAuthSent = true;

        if (window.dataLayer) {
            window.dataLayer.push({
                event: "failed_auth",
                param: 'authorization',
                event_action: errorText  // Текст ошибки
            });
        }
    }

    // Функция для проверки и отправки ошибок
    function checkAndSendErrors() {
        const form = document.querySelector('#account');
        if (!form) return;

        // Проверяем только веб-компоненты с атрибутом error-text
        // Это гарантирует, что мы берем только реальные ошибки, установленные бэкендом
        const webInputs = form.querySelectorAll('web-input[error-text], web-input-password[error-text]');

        // Ищем первую реальную (непустую) ошибку
        for (let input of webInputs) {
            let error = input.getAttribute('error-text');

            // Пропускаем пустые значения (пустая строка или null)
            if (!error || error.trim() === '') {
                continue;
            }

            error = error.trim();

            // Проверяем, что это не label и не placeholder элемента
            const label = input.getAttribute('label') || '';
            const placeholder = input.getAttribute('placeholder') || '';

            // Если ошибка совпадает с label или placeholder - это не ошибка, пропускаем
            if (error === label || error === placeholder) {
                continue;
            }

            // Это реальная ошибка - отправляем
            sendFailedAuth(error);
            return; // Выходим после первой найденной ошибки
        }

        // Fallback: проверяем элементы с классом .input__error-text
        // Но только если они не являются label элементами
        const errorTextElements = form.querySelectorAll('.input__error-text');
        for (let element of errorTextElements) {
            let error = element.textContent?.trim();

            // Пропускаем пустые значения
            if (!error || error === '') {
                continue;
            }

            // Проверяем, что родительский элемент - это не label
            const parent = element.closest('web-input, web-input-password');
            if (parent) {
                const label = parent.getAttribute('label') || '';
                const placeholder = parent.getAttribute('placeholder') || '';

                // Если текст совпадает с label или placeholder - пропускаем
                if (error === label || error === placeholder) {
                    continue;
                }
            }

            // Это реальная ошибка - отправляем
            sendFailedAuth(error);
            return; // Выходим после первой ошибки
        }
    }

    // Автоматический tracking ошибок
    document.addEventListener('DOMContentLoaded', () => {
        const form = document.querySelector('#account');
        if (!form) return;

        // Проверяем ошибки при загрузке страницы
        checkAndSendErrors();

        // Debounce для MutationObserver
        let checkTimeout = null;
        const debouncedCheck = () => {
            if (checkTimeout) {
                clearTimeout(checkTimeout);
            }
            checkTimeout = setTimeout(() => {
                failedAuthSent = false; // Сбрасываем флаг перед проверкой
                checkAndSendErrors();
            }, 100);
        };

        // Отслеживаем динамические изменения
        const observer = new MutationObserver((mutations) => {
            let hasErrorTextChange = false;

            mutations.forEach((mutation) => {
                if (mutation.type === 'attributes' && mutation.attributeName === 'error-text') {
                    hasErrorTextChange = true;
                }
                if (mutation.addedNodes.length > 0) {
                    mutation.addedNodes.forEach((node) => {
                        if (node.nodeType === 1 && node.hasAttribute && node.hasAttribute('error-text')) {
                            hasErrorTextChange = true;
                        }
                    });
                }
            });

            // Вызываем проверку только если действительно изменился error-text
            if (hasErrorTextChange) {
                debouncedCheck();
            }
        });

        // Наблюдаем за изменениями в форме
        observer.observe(form, {
            attributes: true,
            childList: true,
            subtree: true,
            attributeFilter: ['error-text']
        });
    });
</script>
